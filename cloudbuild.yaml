steps:
  # Step 1: Build Docker image
  # NEXT_PUBLIC_* vars must be build args so Next.js inlines them into client bundles
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_SENTRY_DSN=$$NEXT_PUBLIC_SENTRY_DSN'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=$$NEXT_PUBLIC_APP_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_VAPID_PUBLIC_KEY=$$NEXT_PUBLIC_VAPID_PUBLIC_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vettdre:$BUILD_ID'
      - '.'
    secretEnv:
      - 'NEXT_PUBLIC_SUPABASE_URL'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - 'NEXT_PUBLIC_SENTRY_DSN'
      - 'NEXT_PUBLIC_APP_URL'
      - 'NEXT_PUBLIC_VAPID_PUBLIC_KEY'
      - 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vettdre:$BUILD_ID'

  # Step 3: Deploy to Cloud Run with all runtime secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vettdre'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vettdre:$BUILD_ID'
      - '--region'
      - 'us-east1'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--set-secrets'
      - >-
        DATABASE_URL=DATABASE_URL:latest,
        DIRECT_URL=DIRECT_URL:latest,
        NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest,
        NEXT_PUBLIC_SUPABASE_ANON_KEY=NEXT_PUBLIC_SUPABASE_ANON_KEY:latest,
        NEXT_PUBLIC_SENTRY_DSN=NEXT_PUBLIC_SENTRY_DSN:latest,
        NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest,
        NEXT_PUBLIC_VAPID_PUBLIC_KEY=NEXT_PUBLIC_VAPID_PUBLIC_KEY:latest,
        SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,
        ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,
        STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,
        STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,
        STRIPE_PRO_MONTHLY_PRICE_ID=STRIPE_PRO_MONTHLY_PRICE_ID:latest,
        STRIPE_PRO_YEARLY_PRICE_ID=STRIPE_PRO_YEARLY_PRICE_ID:latest,
        STRIPE_EXPLORER_MONTHLY_PRICE_ID=STRIPE_EXPLORER_MONTHLY_PRICE_ID:latest,
        STRIPE_EXPLORER_YEARLY_PRICE_ID=STRIPE_EXPLORER_YEARLY_PRICE_ID:latest,
        STRIPE_TEAM_MONTHLY_PRICE_ID=STRIPE_TEAM_MONTHLY_PRICE_ID:latest,
        TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,
        TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,
        PDL_API_KEY=PDL_API_KEY:latest,
        APOLLO_API_KEY=APOLLO_API_KEY:latest,
        FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest,
        BRAVE_SEARCH_API_KEY=BRAVE_SEARCH_API_KEY:latest,
        GMAIL_CLIENT_ID=GMAIL_CLIENT_ID:latest,
        GMAIL_CLIENT_SECRET=GMAIL_CLIENT_SECRET:latest,
        GMAIL_REDIRECT_URI=GMAIL_REDIRECT_URI:latest,
        NYC_OPEN_DATA_APP_TOKEN=NYC_OPEN_DATA_APP_TOKEN:latest,
        CENSUS_API_KEY=CENSUS_API_KEY:latest,
        GEOCODIO_API_KEY=GEOCODIO_API_KEY:latest,
        HUD_API_TOKEN=HUD_API_TOKEN:latest,
        FRED_API_KEY=FRED_API_KEY:latest,
        FANNIE_CLIENT_ID=FANNIE_CLIENT_ID:latest,
        FANNIE_CLIENT_SECRET=FANNIE_CLIENT_SECRET:latest,
        CRON_SECRET=CRON_SECRET:latest,
        TOKEN_ENCRYPTION_KEY=TOKEN_ENCRYPTION_KEY:latest,
        VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest,
        VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest,
        VAPID_SUBJECT=VAPID_SUBJECT:latest,
        RESEND_API_KEY=RESEND_API_KEY:latest,
        PLAID_CLIENT_ID=PLAID_CLIENT_ID:latest,
        PLAID_SECRET=PLAID_SECRET:latest,
        CRS_API_KEY=CRS_API_KEY:latest,
        CRS_API_SECRET=CRS_API_SECRET:latest,
        CRS_API_BASE_URL=CRS_API_BASE_URL:latest,
        CRS_ACCOUNT_ID=CRS_ACCOUNT_ID:latest,
        UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,
        UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,
        PLAID_WEBHOOK_URL=PLAID_WEBHOOK_URL:latest,
        PLAID_ENV=PLAID_ENV:latest,
        SCREENING_USE_MOCKS=SCREENING_USE_MOCKS:latest,
        IDV_PROVIDER=IDV_PROVIDER:latest,
        DIDIT_API_KEY=DIDIT_API_KEY:latest,
        DIDIT_WEBHOOK_SECRET=DIDIT_WEBHOOK_SECRET:latest,
        DIDIT_WORKFLOW_ID=DIDIT_WORKFLOW_ID:latest,
        BASE_SCREENING_FEE_CENTS=BASE_SCREENING_FEE_CENTS:latest,
        ENHANCED_SCREENING_FEE_CENTS=ENHANCED_SCREENING_FEE_CENTS:latest,
        CREDIT_PROVIDER=CREDIT_PROVIDER:latest,
        TRACERFY_API_KEY=TRACERFY_API_KEY:latest

  # Step 4: Ensure Cloud Scheduler cron jobs exist (idempotent create-or-update)
  # This runs AFTER deploy so the service URL is current.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        REGION="us-east1"
        # Cloud Build substitutes $PROJECT_ID at YAML parse time into a bash var.
        # Inside the script we reference it as $$PROJECT (bash variable) consistently
        # with $$REGION and $$SERVICE_URL.
        PROJECT="$PROJECT_ID"
        SERVICE_URL=$$(gcloud run services describe vettdre --region=$$REGION --project=$$PROJECT --format="value(status.url)")
        CRON_SECRET_VAL=$$(gcloud secrets versions access latest --secret=CRON_SECRET --project=$$PROJECT)

        # job_name|schedule|path|deadline_seconds
        JOBS=(
          "terminal-ingest|*/15 * * * *|/api/terminal/ingest|300"
          "terminal-enrich|5,20,35,50 * * * *|/api/terminal/enrich|300"
          "terminal-generate-briefs|*/5 * * * *|/api/terminal/generate-briefs|300"
          "automations-cron|*/30 * * * *|/api/automations/cron|60"
          "leasing-follow-ups|*/15 * * * *|/api/leasing/follow-ups|60"
          "intel-condo-units-refresh|0 8 * * 0|/api/intel/condo-units-refresh|300"
          "intel-acris-sync|0 9 * * *|/api/intel/acris-sync|300"
          "intel-hpd-mdr-sync|0 10 * * *|/api/intel/hpd-mdr-sync|300"
          "intel-exemptions-refresh|0 11 * * 0|/api/intel/exemptions-refresh|300"
          "intel-tax-liens-sync|0 12 1 * *|/api/intel/tax-liens-sync|300"
          "intel-nys-corps-sync|0 13 * * 0|/api/intel/nys-corps-sync|300"
          "intel-ofac-sync|0 14 * * 1|/api/intel/ofac-sync|300"
          "intel-resolve-edges|0 2 * * *|/api/intel/resolve-edges|300"
          "intel-mortgage-sync|0 5 * * *|/api/intel/mortgage-sync|300"
          "intel-distress-recompute|0 6 * * 0|/api/intel/distress-recompute|300"
          "intel-building-signals|0 7 * * *|/api/intel/building-signals-recompute|300"
        )

        for job_def in "$${JOBS[@]}"; do
          # NOTE: don't name a variable PATH — it shadows the executable search
          # PATH env var and breaks gcloud lookups inside the loop.
          IFS='|' read -r NAME SCHEDULE URL_PATH DEADLINE <<< "$$job_def"
          URI="$${SERVICE_URL}$${URL_PATH}"
          echo "Ensuring scheduler job: $$NAME → $$URI"
          if ! gcloud scheduler jobs create http "$$NAME" \
            --schedule="$$SCHEDULE" --uri="$$URI" --http-method=GET \
            --headers="Authorization=Bearer $$CRON_SECRET_VAL" \
            --time-zone="America/New_York" --attempt-deadline="$${DEADLINE}s" \
            --location="$$REGION" --project="$$PROJECT" 2>/dev/null; then
            gcloud scheduler jobs update http "$$NAME" \
              --schedule="$$SCHEDULE" --uri="$$URI" --http-method=GET \
              --headers="Authorization=Bearer $$CRON_SECRET_VAL" \
              --time-zone="America/New_York" --attempt-deadline="$${DEADLINE}s" \
              --location="$$REGION" --project="$$PROJECT"
          fi
        done
        echo "Cloud Scheduler jobs verified."

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vettdre:$BUILD_ID'

# Build-time secrets (NEXT_PUBLIC_* vars needed during docker build for edge inlining)
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SENTRY_DSN/versions/latest
      env: 'NEXT_PUBLIC_SENTRY_DSN'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_APP_URL/versions/latest
      env: 'NEXT_PUBLIC_APP_URL'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_VAPID_PUBLIC_KEY/versions/latest
      env: 'NEXT_PUBLIC_VAPID_PUBLIC_KEY'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY/versions/latest
      env: 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY'
