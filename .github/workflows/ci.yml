name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Status-check naming contract (do not rename — branch protection rules
# match by job ID; renaming requires updating GitHub branch protection
# in lockstep). Future slices ADD names (Z.0b → e2e, Z.2 → lighthouse-warn);
# never rename existing.
jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck (baseline ≤ 515 — CI canonical)
        # Inline baseline-check wrapper. tsc exits non-zero on any error.
        # CI canonical baseline: 515 errors (was 285 on local-filtered tree
        # per CLAUDE.md; CI ground truth on first PR-blocking run was 515 —
        # see SLICES-speed.md `z0a-followup-typecheck-gap-investigation`
        # for the 228-error gap investigation). CI is now the source of
        # truth for baselines going forward; local measurements are
        # estimates that may diverge due to Finder-dupe pollution and
        # tooling differences. Methodology v2.2 §"Verified-claim audit
        # pattern" caught this drift on the first CI run that shipped.
        run: |
          set -o pipefail
          count=$(npx tsc --noEmit 2>&1 | grep -cE "error TS" || true)
          echo "Typecheck errors: $count (baseline: 515)"
          if [ "$count" -gt 515 ]; then
            echo "::error::Typecheck baseline regressed ($count > 515). Fix or revert before merge."
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint (baseline ≤ 4484)
        # Inline baseline-check wrapper. eslint exits non-zero on any error;
        # the codebase has 4484 pre-existing lint errors. Same pattern as
        # typecheck. See SLICES-bms.md "Lint baseline (Phase 3 mid)".
        run: |
          set -o pipefail
          count=$(npm run lint 2>&1 | grep -cE "^[[:space:]]+[0-9]+:[0-9]+[[:space:]]+error" || true)
          echo "Lint errors: $count (baseline: 4484)"
          if [ "$count" -gt 4484 ]; then
            echo "::error::Lint baseline regressed ($count > 4484). Fix or revert before merge."
            exit 1
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
